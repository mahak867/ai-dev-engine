name: Quality Gate

on:
  push:
    branches: [main]

jobs:
  engine-quality:
    name: Engine Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check core files exist and have content
        run: |
          python3 -c "
          import os, sys
          required = [
              'core/ai/fullstack_pipeline.py',
              'core/ai/post_fixer.py',
              'core/ai/groq_provider.py',
              'core/ai/project_classifier.py',
              'core/orchestrator.py',
              'cli.py',
              'launcher.py',
          ]
          ok = True
          for f in required:
              if os.path.exists(f) and os.path.getsize(f) > 1000:
                  print(f'OK: {f} ({os.path.getsize(f):,} bytes)')
              else:
                  print(f'MISSING or EMPTY: {f}')
                  ok = False
          sys.exit(0 if ok else 1)
          "
