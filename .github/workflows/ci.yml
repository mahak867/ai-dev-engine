name: CI — APEX Engine Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  lint-and-syntax:
    name: Syntax & Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8 pylint

      - name: Check Python syntax (all engine files)
        run: |
          python -m py_compile core/ai/fullstack_pipeline.py
          python -m py_compile core/ai/post_fixer.py
          python -m py_compile core/ai/groq_provider.py
          python -m py_compile core/ai/project_classifier.py
          python -m py_compile core/ai/integrations.py
          python -m py_compile core/ai/senior_team.py
          python -m py_compile core/ai/skills_library.py
          python -m py_compile core/orchestrator.py
          python -m py_compile launcher.py
          python -m py_compile cli.py
          python -m py_compile telegram_bot.py
          echo "✓ All engine files pass syntax check"

      - name: Verify no duplicate --clerk argument
        run: |
          COUNT=$(grep -c "\-\-clerk" cli.py || true)
          if [ "$COUNT" -gt "1" ]; then
            echo "ERROR: Duplicate --clerk argument in cli.py ($COUNT occurrences)"
            exit 1
          fi
          echo "✓ No duplicate --clerk argument"

      - name: Verify no hardcoded secrets
        run: |
          python3 - << 'PYEOF'
          import re, sys, os

          patterns = [
              (r'gsk_[a-zA-Z0-9]{20,}', 'Groq key'),
              (r'sk-[a-zA-Z0-9]{20,}', 'OpenAI key'),
              (r'pk_live_[a-zA-Z0-9]{20,}', 'Stripe live key'),
              (r'sk_live_[a-zA-Z0-9]{20,}', 'Stripe secret'),
              (r'ghp_[a-zA-Z0-9]{30,}', 'GitHub token'),
              (r're_[a-zA-Z0-9]{35,}', 'Resend key'),
          ]

          issues = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['__pycache__', '.git', 'node_modules', 'projects']]
              for fname in files:
                  if not fname.endswith(('.py', '.js', '.json', '.yml', '.yaml', '.env')):
                      continue
                  path = os.path.join(root, fname)
                  try:
                      content = open(path, encoding='utf-8', errors='ignore').read()
                      for pattern, label in patterns:
                          for match in re.findall(pattern, content):
                              if any(x in match.lower() for x in ['your', 'example', 'placeholder', 'test_your']):
                                  continue
                              issues.append(f'{label} in {path}: {match[:20]}...')
                  except:
                      pass

          if issues:
              for i in issues:
                  print(f'SECRET FOUND: {i}')
              sys.exit(1)
          else:
              print('✓ No hardcoded secrets found')
          PYEOF

  test-imports:
    name: Import & Module Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install engine dependencies
        run: |
          pip install flask flask-cors flask-sqlalchemy flask-bcrypt \
                      python-dotenv requests stripe

      - name: Test all core modules import correctly
        run: |
          python3 - << 'PYEOF'
          import sys
          sys.path.insert(0, '.')

          modules = [
              ('core.ai.skills_library', ['get_skill_prompt', 'get_all_skills_for_complexity', 'SKILLS']),
              ('core.ai.integrations', ['detect_integrations', 'get_integration_prompt', 'INTEGRATIONS']),
              ('core.ai.project_classifier', ['ProjectClassifier']),
              ('core.ai.groq_provider', ['generate', 'GROQ_MODELS']),
          ]

          all_ok = True
          for module_name, expected_attrs in modules:
              try:
                  import importlib
                  mod = importlib.import_module(module_name)
                  for attr in expected_attrs:
                      if not hasattr(mod, attr):
                          print(f'MISSING: {module_name}.{attr}')
                          all_ok = False
                  print(f'✓ {module_name}')
              except ImportError as e:
                  print(f'IMPORT ERROR: {module_name}: {e}')
                  all_ok = False

          sys.exit(0 if all_ok else 1)
          PYEOF

      - name: Test skills library completeness
        run: |
          python3 - << 'PYEOF'
          import sys
          sys.path.insert(0, '.')
          from core.ai.skills_library import SKILLS, get_skill_prompt, get_all_skills_for_complexity

          required_skills = ['security_auditor', 'api_design', 'frontend_design',
                             'code_refactor', 'performance_audit', 'deployment_skill']
          missing = [s for s in required_skills if s not in SKILLS]
          if missing:
              print(f'MISSING SKILLS: {missing}')
              sys.exit(1)

          for complexity in ['simple', 'moderate', 'complex', 'advanced']:
              result = get_all_skills_for_complexity(complexity, {})
              if len(result) < 100:
                  print(f'Skills too short for {complexity}: {len(result)} chars')
                  sys.exit(1)

          print(f'✓ All {len(SKILLS)} skills present and functional')
          PYEOF

      - name: Test integrations library
        run: |
          python3 - << 'PYEOF'
          import sys
          sys.path.insert(0, '.')
          from core.ai.integrations import detect_integrations, INTEGRATIONS

          test_cases = [
              ({'request': 'build a SaaS with payments', 'spec': {'needs_payments': True, 'needs_auth': True}},
               ['clerk', 'stripe']),
              ({'request': 'build a real-time chat app', 'spec': {'needs_realtime': True}},
               ['realtime']),
              ({'request': 'build analytics dashboard with charts', 'spec': {'project_type': 'dashboard'}},
               ['charts']),
          ]

          all_ok = True
          for test, expected in test_cases:
              detected = detect_integrations(test['request'], test['spec'])
              for exp in expected:
                  if exp not in detected:
                      print(f'MISSING: {exp} not detected in {test["request"][:40]}')
                      all_ok = False

          print(f'✓ Integration detection working correctly ({len(INTEGRATIONS)} integrations)' if all_ok else 'FAILED')
          sys.exit(0 if all_ok else 1)
          PYEOF
