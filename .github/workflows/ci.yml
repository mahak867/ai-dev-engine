name: CI — APEX Engine Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    name: Syntax & Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: |
          for f in core/ai/fullstack_pipeline.py core/ai/post_fixer.py core/ai/groq_provider.py core/ai/project_classifier.py core/orchestrator.py cli.py launcher.py telegram_bot.py; do
            if [ -f "$f" ]; then python -m py_compile "$f" && echo "OK: $f"; fi
          done
          for f in core/ai/integrations.py core/ai/senior_team.py core/ai/skills_library.py; do
            if [ -f "$f" ]; then python -m py_compile "$f" && echo "OK: $f"; fi
          done

  import-tests:
    name: Import & Module Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -q flask flask-sqlalchemy flask-cors flask-bcrypt python-dotenv requests stripe
      - name: Test imports
        run: |
          python3 -c "
          import sys; sys.path.insert(0,'.')
          from core.ai.groq_provider import generate, GROQ_MODELS
          from core.ai.project_classifier import ProjectClassifier, PROJECT_TYPES
          print('OK: core modules import successfully')
          if hasattr(sys.modules.get('core.ai.integrations', type('',(),{'INTEGRATIONS':{}})()),'INTEGRATIONS'):
              pass
          try:
              from core.ai.integrations import INTEGRATIONS
              print(f'OK: {len(INTEGRATIONS)} integrations')
          except: print('SKIP: integrations not yet pushed')
          try:
              from core.ai.skills_library import SKILLS
              print(f'OK: {len(SKILLS)} skills')
          except: print('SKIP: skills_library not yet pushed')
          "
