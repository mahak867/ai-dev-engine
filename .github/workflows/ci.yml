name: CI - APEX Engine Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  syntax-check:
    name: Syntax & Lint Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check syntax
        run: |
          python -m py_compile core/ai/fullstack_pipeline.py && echo "OK: fullstack_pipeline.py"
          python -m py_compile core/ai/post_fixer.py && echo "OK: post_fixer.py"
          python -m py_compile core/ai/groq_provider.py && echo "OK: groq_provider.py"
          python -m py_compile core/ai/project_classifier.py && echo "OK: project_classifier.py"
          python -m py_compile core/orchestrator.py && echo "OK: orchestrator.py"
          python -m py_compile cli.py && echo "OK: cli.py"
          python -m py_compile launcher.py && echo "OK: launcher.py"
          python -m py_compile telegram_bot.py && echo "OK: telegram_bot.py"
          [ -f core/ai/integrations.py ] && python -m py_compile core/ai/integrations.py && echo "OK: integrations.py"
          [ -f core/ai/senior_team.py ] && python -m py_compile core/ai/senior_team.py && echo "OK: senior_team.py"
          [ -f core/ai/skills_library.py ] && python -m py_compile core/ai/skills_library.py && echo "OK: skills_library.py"

  import-tests:
    name: Import & Module Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -q flask flask-sqlalchemy flask-cors flask-bcrypt python-dotenv requests
      - name: Test imports
        run: |
          python3 << 'PYEOF'
          import sys
          sys.path.insert(0, '.')
          ok = True

          tests = [
              ('core.ai.groq_provider', ['generate', 'GROQ_MODELS']),
              ('core.ai.project_classifier', ['ProjectClassifier', 'PROJECT_TYPES']),
          ]
          optional = [
              ('core.ai.integrations', ['INTEGRATIONS', 'detect_integrations']),
              ('core.ai.skills_library', ['SKILLS', 'get_skill_prompt']),
              ('core.ai.senior_team', ['tech_lead_review', 'backend_review']),
          ]

          for mod, attrs in tests:
              try:
                  import importlib
                  m = importlib.import_module(mod)
                  for a in attrs:
                      assert hasattr(m, a), f'Missing {a}'
                  print(f'OK: {mod}')
              except Exception as e:
                  print(f'FAIL: {mod}: {e}')
                  ok = False

          for mod, attrs in optional:
              try:
                  import importlib
                  m = importlib.import_module(mod)
                  for a in attrs:
                      assert hasattr(m, a), f'Missing {a}'
                  print(f'OK: {mod}')
              except Exception as e:
                  print(f'SKIP (optional): {mod}: {e}')

          sys.exit(0 if ok else 1)
          PYEOF
