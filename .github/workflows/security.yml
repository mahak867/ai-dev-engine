name: Security Scan

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secret-scan:
    name: Secret Scanner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets
        run: |
          python3 << 'PYEOF'
          import re, os, sys
          PATTERNS = [
              r'sk_live_[a-zA-Z0-9]{20,}',
              r'pk_live_[a-zA-Z0-9]{20,}',
              r'AKIA[0-9A-Z]{16}',
          ]
          SAFE = ['your_','example','placeholder','fake','dummy']
          issues = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['__pycache__','.git','node_modules','projects']]
              for fname in files:
                  if not fname.endswith(('.py','.js','.json','.yml')): continue
                  try:
                      c = open(os.path.join(root,fname), encoding='utf-8', errors='ignore').read()
                      for p in PATTERNS:
                          for m in re.findall(p, c):
                              if not any(s in m.lower() for s in SAFE):
                                  issues.append(f'{fname}: {m[:15]}...')
                  except: pass
          if issues:
              for i in issues: print(f'SECRET: {i}')
              sys.exit(1)
          print('Clean: no secrets found')
          PYEOF
